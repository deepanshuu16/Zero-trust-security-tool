<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SecureU | Signup</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles.css" />
    <link rel="stylesheet" href="/auth.css" />
  </head>
  <body class="auth-body">
    <div class="mouse-glow" aria-hidden="true"></div>
    <main class="auth-shell">
      <section class="auth-visual">
        <a class="brand" href="/index.html"><span class="brand-mark">ZT</span><span class="brand-copy"><strong>SecureU</strong><small>Identity Enrollment</small></span></a>
        <div class="shield-orbit" aria-hidden="true"><span></span><span></span><span></span></div>
        <h1>Create a verified Zero Trust identity.</h1>
        <p>New accounts require OTP verification before they become trusted members of the security ecosystem.</p>
      </section>
      <section class="auth-card">
        <span class="eyebrow">Secure Signup</span>
        <h2>Create account</h2>
        <form id="auth-signup-form" class="auth-form">
          <label>Full name<input name="name" placeholder="Security Analyst" autocomplete="name" required /></label>
          <label>Email<input name="email" type="email" placeholder="you@company.com" autocomplete="email" required /></label>
          <label>Password<input name="password" type="password" placeholder="Minimum 8 characters" autocomplete="new-password" minlength="8" required /></label>
          <button class="button-primary" type="submit"><span>Create and verify</span></button>
        </form>
        <p data-auth-message class="auth-message"></p>
        <div class="auth-links"><a href="/login.html">Already have an account?</a></div>
      </section>
    </main>
    <script src="/auth.js"></script>
  </body>
</html>
