<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SecureU | Forgot Password</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles.css" />
    <link rel="stylesheet" href="/auth.css" />
  </head>
  <body class="auth-body">
    <div class="mouse-glow" aria-hidden="true"></div>
    <main class="auth-shell compact">
      <section class="auth-card">
        <span class="eyebrow">Account Recovery</span>
        <h2>Reset access securely</h2>
        <p class="auth-copy">A reset OTP will be sent to your email address.</p>
        <form id="auth-forgot-form" class="auth-form">
          <label>Email<input name="email" type="email" placeholder="you@company.com" autocomplete="email" required /></label>
          <button class="button-primary" type="submit"><span>Send reset OTP</span></button>
        </form>
        <p data-auth-message class="auth-message"></p>
        <div class="auth-links"><a href="/login.html">Back to login</a></div>
      </section>
    </main>
    <script src="/auth.js"></script>
  </body>
</html>
