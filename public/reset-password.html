<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SecureU | Reset Password</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles.css" />
    <link rel="stylesheet" href="/auth.css" />
  </head>
  <body class="auth-body">
    <div class="mouse-glow" aria-hidden="true"></div>
    <main class="auth-shell compact">
      <section class="auth-card">
        <span class="eyebrow">New Credential</span>
        <h2>Set a safer password</h2>
        <form id="auth-reset-form" class="auth-form">
          <label>New password<input name="password" type="password" placeholder="Minimum 8 characters" autocomplete="new-password" minlength="8" required /></label>
          <label>Confirm password<input name="confirmPassword" type="password" placeholder="Repeat password" autocomplete="new-password" minlength="8" required /></label>
          <button class="button-primary" type="submit"><span>Update password</span></button>
        </form>
        <p data-auth-message class="auth-message"></p>
      </section>
    </main>
    <script src="/auth.js"></script>
  </body>
</html>
